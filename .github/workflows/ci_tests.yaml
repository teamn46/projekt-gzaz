# .github/workflows/ci_tests.yaml
name: GZAZ Oprogramowanie Wewnetrzne - CI Pipeline

# Uruchamiaj proces przy pushu na gałąź główną oraz pull requestach do niej
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie repozytorium (Checkout kodu)
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Poprawione z python-python na python-version

    - name: Instalacja wymaganych zależności
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy scipy

    - name: Wykonanie automatycznych testów regresji (PyTest)
      run: |
        pytest testy_pytest.py -v

    - name: Wykonanie automatycznych testów modułu finansowo-księgowego (Unittest)
      run: |
        python testy_finansowe.py
